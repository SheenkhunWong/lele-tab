<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>LeLe Tab</title>
    <script>
      (() => {
        const raw = localStorage.getItem('lele-tab-theme') || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = raw === 'system' ? (prefersDark ? 'dark' : 'light') : raw;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/newtab/main.tsx"></script>
  </body>
</html>
