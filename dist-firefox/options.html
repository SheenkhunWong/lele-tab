    <meta name="color-scheme" content="light dark" />
    <title>LeLe Tab Options</title>
    <script>
      (() => {
        const raw = localStorage.getItem('lele-tab-theme') || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = raw === 'system' ? (prefersDark ? 'dark' : 'light') : raw;
      })();
    </script>
